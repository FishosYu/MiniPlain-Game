<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniPlain 物品一览</title>
  <style>
    :root {
      --bg: #8fc6cc;
      --grass: #7da85b;
      --soil: #6f4a34;
      --panel: #fff4d8;
      --card: #fff9e9;
      --text: #2f2b26;
      --muted: #66584c;
      --line: #2f2b26;
      --accent: #d65f43;
      --accent-dark: #8e3528;
      --shadow: #c69a52;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Microsoft YaHei", "SimHei", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(var(--bg) 0 64%, var(--grass) 64% 78%, var(--soil) 78%);
      background-size: 18px 18px, 18px 18px, 100% 100%;
      padding: 22px;
    }

    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    header {
      background: var(--panel);
      border: 4px solid var(--line);
      box-shadow: 8px 8px 0 var(--shadow);
      padding: 20px;
      margin-bottom: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      text-shadow: 4px 4px 0 #efc477;
    }

    .lead {
      color: var(--muted);
      line-height: 1.7;
      max-width: 780px;
    }

    .btn {
      display: inline-block;
      color: #fff;
      background: var(--accent);
      border: 3px solid var(--line);
      box-shadow: 4px 4px 0 var(--accent-dark);
      padding: 9px 12px;
      text-decoration: none;
      font-weight: 700;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--accent-dark);
    }

    .category {
      background: rgba(255, 244, 216, .92);
      border: 4px solid var(--line);
      box-shadow: 6px 6px 0 rgba(47, 43, 38, .22);
      padding: 16px;
      margin-bottom: 18px;
    }

    .category h2 {
      font-size: 1.25rem;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 10px;
    }

    .item {
      min-height: 94px;
      background: var(--card);
      border: 3px solid var(--line);
      box-shadow: 4px 4px 0 #c9b072;
      color: var(--text);
      cursor: pointer;
      padding: 8px 6px;
      font: inherit;
      text-align: center;
    }

    .item:hover,
    .item:focus-visible {
      outline: none;
      background: #ffe8b8;
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 #a98745;
    }

    .emoji {
      display: block;
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .name {
      display: block;
      font-size: .82rem;
      line-height: 1.25;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(37, 31, 26, .5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .modal-bg.show { display: flex; }

    .modal {
      width: min(560px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: var(--panel);
      border: 4px solid var(--line);
      box-shadow: 8px 8px 0 var(--shadow);
      padding: 18px;
    }

    .modal-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      margin-bottom: 14px;
    }

    .modal-title .emoji { margin: 0; }

    .section {
      background: rgba(255, 249, 233, .85);
      border-left: 6px solid var(--accent);
      padding: 10px 12px;
      margin: 10px 0;
    }

    .section h3 {
      font-size: .95rem;
      margin-bottom: 6px;
    }

    ul {
      padding-left: 1.1em;
      color: var(--muted);
      line-height: 1.65;
    }

    .close-row {
      text-align: right;
      margin-top: 14px;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      header, .category, .modal { box-shadow: 5px 5px 0 var(--shadow); }
      .grid { grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); }
      .item { min-height: 84px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div class="topbar">
        <h1>物品一览</h1>
        <div>
          <a class="btn" href="../index.html">返回首页</a>
          <a class="btn" href="../MiniPlain.html">进入 Demo</a>
        </div>
      </div>
      <p class="lead">按类别展示当前 Demo 中已经可获取或可合成的物品。点击格子可查看简介、获取途径、用途，以及它可以参与合成出的物品。</p>
    </header>

    <div id="content"></div>
  </main>

  <div class="modal-bg" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-title" id="modal-title"></div>
      <div id="modal-body"></div>
      <div class="close-row"><button class="btn" type="button" id="close">关闭</button></div>
    </div>
  </div>

  <script src="../data/items.js"></script>
  <script>
    const categories = window.MINIPLAIN_ITEM_CATEGORIES || [];
    const itemData = window.MINIPLAIN_ITEMS || {};
    const items = Object.entries(itemData).map(([id, item]) => {
      const texts = item.texts || {};
      return {
        id,
        cat: item.category,
        name: item.name,
        emoji: item.emoji,
        overview: texts.overview || texts.codex || '等待补充。',
        obtain: texts.obtain || [],
        uses: texts.uses || [],
        usedIn: texts.usedIn || [],
      };
    }).filter(item => item.cat);

    const content = document.getElementById('content');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');

    function listBlock(title, values) {
      const list = values && values.length ? values : ['当前暂无。'];
      return `<section class="section"><h3>${title}</h3><ul>${list.map(value => `<li>${value}</li>`).join('')}</ul></section>`;
    }

    function showItem(item) {
      modalTitle.innerHTML = `<span class="emoji">${item.emoji}</span><span>${item.name}</span>`;
      modalBody.innerHTML = [
        listBlock('简介', [item.overview]),
        listBlock('获取途径 / 合成配方', item.obtain),
        listBlock('用途', item.uses),
        listBlock('可用于合成 / 产出', item.usedIn),
      ].join('');
      modal.classList.add('show');
    }

    function render() {
      content.innerHTML = categories.map(cat => {
        const group = items.filter(item => item.cat === cat);
        if (!group.length) return '';
        return `<section class="category">
          <h2>${cat}</h2>
          <div class="grid">
            ${group.map(item => `<button class="item" type="button" data-id="${item.id}">
              <span class="emoji">${item.emoji}</span>
              <span class="name">${item.name}</span>
            </button>`).join('')}
          </div>
        </section>`;
      }).join('');

      content.querySelectorAll('[data-id]').forEach(button => {
        const item = items.find(entry => entry.id === button.dataset.id);
        button.addEventListener('click', () => showItem(item));
      });
    }

    document.getElementById('close').addEventListener('click', () => modal.classList.remove('show'));
    modal.addEventListener('click', event => {
      if (event.target === modal) modal.classList.remove('show');
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') modal.classList.remove('show');
    });

    render();
  </script>
</body>
</html>
