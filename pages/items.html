<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stonia 物品一览 | 小石之原</title>
  <link rel="icon" type="image/png" href="../assets/2D/ui/stonia-logo.png">
  <style>
    :root {
      --bg: #8fc6cc;
      --grass: #7da85b;
      --soil: #6f4a34;
      --panel: #fff4d8;
      --card: #fff9e9;
      --text: #2f2b26;
      --muted: #66584c;
      --line: #2f2b26;
      --accent: #d65f43;
      --accent-dark: #8e3528;
      --shadow: #c69a52;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Microsoft YaHei", "SimHei", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(var(--bg) 0 64%, var(--grass) 64% 78%, var(--soil) 78%);
      background-size: 18px 18px, 18px 18px, 100% 100%;
      padding: 22px;
    }

    .wrap {
      width: min(1100px, 100%);
      margin: 0 auto;
    }

    header {
      background: var(--panel);
      border: 4px solid var(--line);
      box-shadow: 8px 8px 0 var(--shadow);
      padding: 20px;
      margin-bottom: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      text-shadow: 4px 4px 0 #efc477;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-logo {
      width: clamp(42px, 8vw, 58px);
      height: clamp(42px, 8vw, 58px);
      object-fit: cover;
      background: var(--card);
      border: 3px solid var(--line);
      box-shadow: 3px 3px 0 #c9b072;
      image-rendering: pixelated;
      flex: 0 0 auto;
    }

    .lead {
      color: var(--muted);
      line-height: 1.7;
      max-width: 780px;
    }

    .btn {
      display: inline-block;
      color: #fff;
      background: var(--accent);
      border: 3px solid var(--line);
      box-shadow: 4px 4px 0 var(--accent-dark);
      padding: 9px 12px;
      text-decoration: none;
      font-weight: 700;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--accent-dark);
    }

    .language-toggle {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 20;
      color: var(--text);
      background: var(--card);
      border: 3px solid var(--line);
      box-shadow: 4px 4px 0 #c9b072;
      padding: 8px 10px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .language-toggle:hover,
    .language-toggle:focus-visible {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #c9b072;
      outline: none;
    }

    .category {
      background: rgba(255, 244, 216, .92);
      border: 4px solid var(--line);
      box-shadow: 6px 6px 0 rgba(47, 43, 38, .22);
      padding: 16px;
      margin-bottom: 18px;
    }

    .category h2 {
      font-size: 1.25rem;
      margin-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
      gap: 10px;
    }

    .item {
      min-height: 94px;
      background: var(--card);
      border: 3px solid var(--line);
      box-shadow: 4px 4px 0 #c9b072;
      color: var(--text);
      cursor: pointer;
      padding: 8px 6px;
      font: inherit;
      text-align: center;
    }

    .item:hover,
    .item:focus-visible {
      outline: none;
      background: #ffe8b8;
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 #a98745;
    }

    .emoji {
      display: block;
      font-size: 2rem;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .item-icon {
      display: block;
      width: 36px;
      height: 36px;
      object-fit: contain;
      image-rendering: pixelated;
      margin: 0 auto 6px;
    }

    .name {
      display: block;
      font-size: .82rem;
      line-height: 1.25;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(37, 31, 26, .5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 10;
    }

    .modal-bg.show { display: flex; }

    .modal {
      width: min(560px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: var(--panel);
      border: 4px solid var(--line);
      box-shadow: 8px 8px 0 var(--shadow);
      padding: 18px;
    }

    .modal-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      margin-bottom: 14px;
    }

    .modal-title .emoji,
    .modal-title .item-icon {
      margin: 0;
    }

    .modal-title .item-icon {
      width: 42px;
      height: 42px;
    }

    .section {
      background: rgba(255, 249, 233, .85);
      border-left: 6px solid var(--accent);
      padding: 10px 12px;
      margin: 10px 0;
    }

    .section h3 {
      font-size: .95rem;
      margin-bottom: 6px;
    }

    ul {
      padding-left: 1.1em;
      color: var(--muted);
      line-height: 1.65;
    }

    .close-row {
      text-align: right;
      margin-top: 14px;
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      header, .category, .modal { box-shadow: 5px 5px 0 var(--shadow); }
      .grid { grid-template-columns: repeat(auto-fill, minmax(78px, 1fr)); }
      .item { min-height: 84px; }
    }
  </style>
</head>
<body>
  <button class="language-toggle" type="button" data-locale-toggle data-i18n-aria-label="language.toggleAria">中/En</button>
  <main class="wrap">
    <header>
      <div class="topbar">
        <div class="page-title">
          <img class="page-logo" src="../assets/2D/ui/stonia-logo.png" alt="" aria-hidden="true">
          <h1 data-i18n="itemsPage.title">物品一览</h1>
        </div>
        <div>
          <a class="btn" href="../index.html" data-i18n="common.backToHome">返回首页</a>
          <a class="btn" href="../Stonia.html" data-i18n="common.enterDemo">进入 Demo</a>
        </div>
      </div>
      <p class="lead" data-i18n="itemsPage.lead">按类别展示当前 Demo 中已经可获取或可合成的物品。点击格子可查看简介、获取途径、用途，以及它可以参与合成出的物品。</p>
    </header>

    <div id="content"></div>
  </main>

  <div class="modal-bg" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <div class="modal-title" id="modal-title"></div>
      <div id="modal-body"></div>
      <div class="close-row"><button class="btn" type="button" id="close" data-i18n="common.close">关闭</button></div>
    </div>
  </div>

  <script src="../data/locales/zh-CN.js"></script>
  <script src="../data/locales/en-US.js"></script>
  <script src="../data/i18n.js"></script>
  <script src="../data/items.js"></script>
  <script>
    const I18N = window.STONIA_I18N || {
      t: (_key, _params, fallback) => fallback || _key,
      list: (_key, fallback) => fallback,
      itemName: id => window.MINIPLAIN_ITEMS?.[id]?.name || id,
      itemText: (_id, _field, fallback) => fallback,
      itemTextList: (_id, _field, fallback) => fallback,
      categoryName: category => category,
      applyStatic: () => {},
    };
    const t = (key, params = {}, fallback = '') => I18N.t(key, params, fallback);
    I18N.applyStatic();
    document.title = t('document.itemsTitle', {}, document.title);

    const categories = window.MINIPLAIN_ITEM_CATEGORIES || [];
    const itemData = window.MINIPLAIN_ITEMS || {};
    const itemIconRoot = '../';

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function itemIcon(item, className = 'item-icon') {
      if (item.icon) {
        return `<img class="${className}" src="${escapeHtml(itemIconRoot + item.icon)}" alt="${escapeHtml(item.name)}" loading="lazy">`;
      }
      return `<span class="emoji">${escapeHtml(item.emoji || '?')}</span>`;
    }

    function buildItems() {
      return Object.entries(itemData).map(([id, item]) => {
        const texts = item.texts || {};
        return {
          id,
          cat: item.category,
          name: I18N.itemName(id),
          emoji: item.emoji,
          icon: item.icon,
          overview: I18N.itemText(id, 'overview', texts.overview || texts.codex || t('itemsPage.fallbackOverview', {}, 'Waiting for details.')),
          obtain: I18N.itemTextList(id, 'obtain', texts.obtain || []),
          uses: I18N.itemTextList(id, 'uses', texts.uses || []),
          usedIn: I18N.itemTextList(id, 'usedIn', texts.usedIn || []),
        };
      }).filter(item => item.cat);
    }

    let items = buildItems();
    let activeItemId = null;

    const content = document.getElementById('content');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modal-title');
    const modalBody = document.getElementById('modal-body');

    function listBlock(title, values) {
      const list = values && values.length ? values : [t('itemsPage.empty', {}, 'None yet.')];
      return `<section class="section"><h3>${escapeHtml(title)}</h3><ul>${list.map(value => `<li>${escapeHtml(value)}</li>`).join('')}</ul></section>`;
    }

    function showItem(item) {
      activeItemId = item.id;
      modalTitle.innerHTML = `${itemIcon(item)}<span>${escapeHtml(item.name)}</span>`;
      modalBody.innerHTML = [
        listBlock(t('itemsPage.overview', {}, 'Overview'), [item.overview]),
        listBlock(t('itemsPage.obtain', {}, 'How to obtain / recipes'), item.obtain),
        listBlock(t('itemsPage.uses', {}, 'Uses'), item.uses),
        listBlock(t('itemsPage.usedIn', {}, 'Used in'), item.usedIn),
      ].join('');
      modal.classList.add('show');
    }

    function render() {
      content.innerHTML = categories.map(cat => {
        const group = items.filter(item => item.cat === cat);
        if (!group.length) return '';
        return `<section class="category">
          <h2>${escapeHtml(I18N.categoryName(cat))}</h2>
          <div class="grid">
            ${group.map(item => `<button class="item" type="button" data-id="${item.id}">
              ${itemIcon(item)}
              <span class="name">${escapeHtml(item.name)}</span>
            </button>`).join('')}
          </div>
        </section>`;
      }).join('');

      content.querySelectorAll('[data-id]').forEach(button => {
        const item = items.find(entry => entry.id === button.dataset.id);
        button.addEventListener('click', () => showItem(item));
      });
    }

    document.getElementById('close').addEventListener('click', () => modal.classList.remove('show'));
    modal.addEventListener('click', event => {
      if (event.target === modal) modal.classList.remove('show');
    });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape') modal.classList.remove('show');
    });

    document.addEventListener('stonia:localechange', () => {
      document.title = t('document.itemsTitle', {}, document.title);
      items = buildItems();
      render();
      if (modal.classList.contains('show') && activeItemId) {
        const item = items.find(entry => entry.id === activeItemId);
        if (item) showItem(item);
      }
    });

    render();
  </script>
</body>
</html>
