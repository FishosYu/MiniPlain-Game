<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniPlain</title>
  <style>
    :root {
      --sky: #9ed0d8;
      --sun: #ffd46b;
      --grass: #7da85b;
      --soil: #6f4a34;
      --stone: #5f6270;
      --panel: #fff4d8;
      --panel-shadow: #d2a85e;
      --text: #2f2b26;
      --muted: #66584c;
      --accent: #d65f43;
      --accent-dark: #8e3528;
      --cream: #fff9e9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      min-height: 100%;
      background:
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(var(--sky) 0 68%, var(--grass) 68% 82%, var(--soil) 82%);
      background-size: 18px 18px, 18px 18px, 100% 100%;
    }

    body {
      min-height: 100vh;
      font-family: "Microsoft YaHei", "SimHei", "Segoe UI", sans-serif;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      image-rendering: pixelated;
    }

    .scene {
      width: min(980px, 100%);
      position: relative;
      padding-top: 42px;
    }

    .sun {
      position: absolute;
      top: 0;
      right: 8%;
      width: 74px;
      height: 74px;
      background: var(--sun);
      box-shadow: 0 0 0 8px rgba(255, 212, 107, .28);
    }

    .cloud {
      position: absolute;
      top: 36px;
      left: 4%;
      width: 126px;
      height: 36px;
      background: var(--cream);
      box-shadow: 36px -18px 0 var(--cream), 72px 0 0 var(--cream), 18px 18px 0 rgba(255,255,255,.45);
      opacity: .9;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 22px;
      align-items: stretch;
      background: var(--panel);
      border: 4px solid var(--text);
      box-shadow: 8px 8px 0 var(--panel-shadow), 12px 12px 0 rgba(47, 43, 38, .25);
      padding: 28px;
    }

    .eyebrow {
      display: inline-block;
      font-size: .82rem;
      letter-spacing: .12em;
      color: var(--accent-dark);
      background: #ffe4ba;
      border: 2px solid var(--accent-dark);
      padding: 5px 8px;
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2.6rem, 9vw, 5.8rem);
      line-height: .9;
      text-transform: uppercase;
      text-shadow: 4px 4px 0 #efc477;
      margin-bottom: 18px;
    }

    .lead {
      max-width: 560px;
      font-size: 1.05rem;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      color: #fff;
      background: var(--accent);
      border: 3px solid var(--text);
      padding: 12px 18px;
      font-weight: 700;
      box-shadow: 5px 5px 0 var(--accent-dark);
      transition: transform .12s ease, box-shadow .12s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0 var(--accent-dark);
    }

    .btn.secondary {
      background: #5f8f57;
      box-shadow: 5px 5px 0 #37613a;
    }

    .btn.secondary:hover,
    .btn.secondary:focus-visible {
      box-shadow: 3px 3px 0 #37613a;
    }

    .note {
      color: var(--muted);
      font-size: .86rem;
    }

    .card {
      background: #fff9e9;
      border: 3px solid var(--text);
      box-shadow: 5px 5px 0 #c9b072;
      padding: 18px;
    }

    .map {
      display: grid;
      grid-template-columns: repeat(7, 28px);
      gap: 4px;
      justify-content: center;
      margin-bottom: 18px;
    }

    .tile {
      width: 28px;
      height: 28px;
      border: 2px solid rgba(47, 43, 38, .42);
      background: #ddd1bd;
    }

    .tile.grass { background: #89b65f; }
    .tile.stone { background: var(--stone); }
    .tile.water { background: #5aa5c5; }
    .tile.fire { background: #ef7e42; }
    .tile.player { background: #f7e07e; }
    .tile.crystal { background: #a78bdc; }

    .features {
      display: grid;
      gap: 10px;
      list-style: none;
      color: var(--muted);
      line-height: 1.6;
      font-size: .95rem;
    }

    .features li {
      border-left: 6px solid #89b65f;
      padding-left: 10px;
      background: rgba(255, 228, 186, .45);
    }

    .footer {
      margin-top: 18px;
      text-align: center;
      color: rgba(47, 43, 38, .7);
      font-size: .82rem;
    }

    @media (max-width: 780px) {
      body { padding: 14px; align-items: flex-start; }
      .scene { padding-top: 26px; }
      .hero { grid-template-columns: 1fr; padding: 20px; }
      .sun { width: 48px; height: 48px; right: 4%; }
      .cloud { transform: scale(.75); transform-origin: left top; }
    }
  </style>
</head>
<body>
  <main class="scene">
    <div class="cloud" aria-hidden="true"></div>
    <div class="sun" aria-hidden="true"></div>

    <section class="hero" aria-labelledby="title">
      <div>
        <span class="eyebrow">轻探索 · 采集 · 制造 · 烹饪</span>
        <h1 id="title">MiniPlain</h1>
        <p class="lead">
          掉进一片被石头盖住的小小平原，从中心格开始一点点凿开道路。
          收集矿物和食材，搭起篝火，做出料理，读完遗落书页，让荒地慢慢露出它原本的样子。
        </p>
        <div class="actions">
          <a class="btn" href="./MiniPlain.html">进入 Demo</a>
          <a class="btn secondary" href="./pages/items.html">查看物品图鉴</a>
          <span class="note">纯前端原型，打开即可游玩。</span>
        </div>
      </div>

      <aside class="card" aria-label="游戏特点">
        <div class="map" aria-hidden="true">
          <span class="tile stone"></span><span class="tile stone"></span><span class="tile grass"></span><span class="tile stone"></span><span class="tile water"></span><span class="tile stone"></span><span class="tile stone"></span>
          <span class="tile stone"></span><span class="tile grass"></span><span class="tile grass"></span><span class="tile grass"></span><span class="tile water"></span><span class="tile water"></span><span class="tile stone"></span>
          <span class="tile stone"></span><span class="tile grass"></span><span class="tile player"></span><span class="tile grass"></span><span class="tile grass"></span><span class="tile stone"></span><span class="tile stone"></span>
          <span class="tile grass"></span><span class="tile grass"></span><span class="tile grass"></span><span class="tile fire"></span><span class="tile grass"></span><span class="tile stone"></span><span class="tile crystal"></span>
          <span class="tile stone"></span><span class="tile grass"></span><span class="tile stone"></span><span class="tile grass"></span><span class="tile grass"></span><span class="tile grass"></span><span class="tile stone"></span>
        </div>
        <ul class="features">
          <li>凿石消耗体力，也会发现新的资源、动物、植物和事件。</li>
          <li>用工具箱、铸造台和篝火，把材料变成装备、设施和料理。</li>
          <li>夜晚会缩小视野，篝火和水晶球能照亮身边的格子。</li>
          <li>当前目标是收集 7 页遗落书页，并把它们交给水晶球。</li>
        </ul>
      </aside>
    </section>

    <p class="footer">WASD / 方向键移动，点击高亮格凿开石头。</p>
  </main>
</body>
</html>
